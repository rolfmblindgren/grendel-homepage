    <path d="M232 615c38-68 73-78 108-56 30 18 54 16 91-16 18-16 31-26 53-35" fill="none" stroke="url(#line)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="253" cy="592" r="7" fill="#1b8f7e"/>
    <circle cx="347" cy="562" r="7" fill="#1b8f7e"/>
    <circle cx="427" cy="549" r="7" fill="#1b8f7e"/>
    <circle cx="470" cy="542" r="7" fill="#f2a77e"/>
