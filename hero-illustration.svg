    <rect x="602" y="282" width="370" height="150" rx="34" fill="url(#panelWarm)" stroke="#0f5c51" stroke-opacity="0.10"/>
    <rect x="628" y="312" width="108" height="22" rx="11" fill="#1b8f7e" fill-opacity="0.18"/>
    <rect x="628" y="350" width="290" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.11"/>
    <rect x="628" y="378" width="238" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.11"/>
    <rect x="628" y="404" width="173" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.11"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="655" y="470" width="317" height="170" rx="32" fill="#fffdf9" stroke="#0f5c51" stroke-opacity="0.10"/>
    <rect x="680" y="498" width="110" height="22" rx="11" fill="#8af0df" fill-opacity="0.45"/>
    <rect x="680" y="534" width="248" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.10"/>
    <rect x="680" y="562" width="216" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.10"/>
    <rect x="680" y="590" width="178" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.10"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="545" y="610" width="275" height="112" rx="28" fill="url(#green)" opacity="0.88"/>
    <path d="M585 694h196" stroke="#fffdf9" stroke-opacity="0.88" stroke-width="11" stroke-linecap="round"/>
    <circle cx="605" cy="638" r="13" fill="#fffdf9" fill-opacity="0.92"/>
