  <g opacity="0.9">
    <path d="M300 750c54 28 118 38 190 28" fill="none" stroke="#1b8f7e" stroke-opacity="0.16" stroke-width="8" stroke-linecap="round"/>
    <path d="M785 748c46-8 92-8 140 0" fill="none" stroke="#1b8f7e" stroke-opacity="0.14" stroke-width="8" stroke-linecap="round"/>
    <circle cx="476" cy="748" r="8" fill="#f2a77e" fill-opacity="0.95"/>
