    <rect x="208" y="358" width="280" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.10"/>
    <rect x="208" y="388" width="226" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.10"/>
    <rect x="208" y="418" width="250" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.10"/>
    <rect x="208" y="452" width="145" height="16" rx="8" fill="#1b8f7e" fill-opacity="0.08"/>

