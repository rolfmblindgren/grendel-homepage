<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Illustrasjon av Grendel sitt programvareverksted</title>
  <desc id="desc">Varm, glasert illustrasjon med appkort, kodepanel og myke former i grønt og krem.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="42%" stop-color="#eefbf7"/>
      <stop offset="100%" stop-color="#e6f7f3"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf9" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#dff8f2" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="panelWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#f4e7d6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8af0df"/>
      <stop offset="100%" stop-color="#1b8f7e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b8f7e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1b8f7e" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#17312c" flood-opacity="0.16"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.07 0 1 0 0 0.46 0 0 1 0 0.41 0 0 0 0.22 0"/>
    </filter>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#157266" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.55"/>

  <circle cx="180" cy="170" r="150" fill="#8af0df" opacity="0.15" filter="url(#softGlow)"/>
  <circle cx="980" cy="150" r="180" fill="#fff0d7" opacity="0.75" filter="url(#softGlow)"/>
  <circle cx="980" cy="720" r="220" fill="#53cbb7" opacity="0.10" filter="url(#softGlow)"/>
  <path d="M126 670c82-88 164-124 263-108 65 11 128 46 183 102 23 24 45 50 68 71 35 32 77 54 129 66 78 17 173 3 233-44" fill="none" stroke="#1b8f7e" stroke-opacity="0.11" stroke-width="12" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="135" y="135" width="930" height="630" rx="42" fill="url(#panel)" stroke="#0f5c51" stroke-opacity="0.12"/>
  </g>

  <g opacity="0.95">
    <rect x="175" y="175" width="860" height="70" rx="24" fill="url(#panelWarm)" stroke="#0f5c51" stroke-opacity="0.08"/>
    <circle cx="217" cy="210" r="12" fill="#f1b48d"/>
    <circle cx="255" cy="210" r="12" fill="#8ee0d5"/>
    <circle cx="293" cy="210" r="12" fill="#77c8b8"/>
