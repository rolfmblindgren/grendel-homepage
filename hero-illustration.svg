  </g>

  <g opacity="0.95">
    <path d="M835 255l22-25 22 25-22 25z" fill="#f2a77e" fill-opacity="0.85"/>
    <path d="M870 248l12-14 12 14-12 14z" fill="#8af0df" fill-opacity="0.92"/>
    <path d="M914 667l20-20 20 20-20 20z" fill="#fff7ed" fill-opacity="0.88"/>
    <circle cx="883" cy="705" r="11" fill="#1b8f7e" fill-opacity="0.78"/>
