name: deploy-homepage

on:
  push:
    branches: ["main", "master"]
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ vars.DEPLOY_HOST || 'dnsgrendel.grendel.no' }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER || 'deployshiny' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v6

      - name: Sjekk deploy-variabler
        run: |
          : "${DEPLOY_HOST:?Set repository variable DEPLOY_HOST or use the default}"
          : "${DEPLOY_USER:?Set repository variable DEPLOY_USER or use the default}"

      - name: Sett opp SSH
        run: |
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "${{ secrets.SHINY_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Oppdater GA-tall
        env:
          GA_PROPERTY_ID: ${{ vars.GA_PROPERTY_ID }}
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
          GA_START_DATE: ${{ vars.GA_START_DATE }}
          GA_END_DATE: ${{ vars.GA_END_DATE }}
        run: php scripts/refresh_ga.php

      - name: Render landingsside
        run: php index.php > index.html

      - name: Render sitemap
        run: php scripts/render_sitemap.php > sitemap.xml

      - name: Fjern gammel index.html og index.php
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "rm -f /srv/shiny-server/index.html /srv/shiny-server/index.php"

      - name: Synkroniser homepage-filer
        run: |
          scp -i ~/.ssh/id_rsa -o IdentitiesOnly=yes \
            index.html sitemap.xml robots.txt content.json favicon.svg og.svg grendel-g.png \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/srv/shiny-server/"

      - name: Sett filrettigheter
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod 0644 /srv/shiny-server/index.html /srv/shiny-server/sitemap.xml /srv/shiny-server/robots.txt /srv/shiny-server/content.json /srv/shiny-server/favicon.svg /srv/shiny-server/og.svg /srv/shiny-server/grendel-g.png"
